name: "Bidirectional Induction Approach"
hints:
  - name: "Reverse & bidirectional induction"
    force_find: "def List\\.rev[\\s\\S]*?(?=\\ntheorem rev_rev|\\ntheorem List\\.rev_append|\\ntheorem List\\.rev_cons)"
    steps:
      - name: "Reverse, recursively"
        description: "First you need to **implement** `List.rev`. Reverse is defined by recursion on the list: the empty list reverses to itself, and `(h :: t)` reverses to `t.rev ++ [h]` (reverse the tail, then put the head at the back)."
      - name: "Implement List.rev"
        description: "Define `List.rev` by pattern matching on the list."
        code_completions:
          - name: "Definition"
            find: "def List\\.rev : List α → List α := sorry"
            replace: "def List.rev : List α → List α\n  | [] => []\n  | h :: t => List.rev t ++ [h]"
      - name: "Why a custom induction principle?"
        description: "The statement `xs.rev.rev = xs` is awkward with ordinary structural induction, because `rev` peels elements off the *front* but appends them at the *back*. A **bidirectional** induction principle — whose inductive step adds an element to both the front and the back (`head :: tail ++ [last]`) — lines up perfectly with how `rev` behaves."
      - name: "State custom induction principle"
        description: "Add the bidirectional induction principle. It takes a `nil` case, a singleton (`sing`) case, and a step that, given `P tail`, proves `P (head :: tail ++ [last])`."
        code_completions:
          - name: "Signature"
            find: "\\| h :: t => List\\.rev t \\+\\+ \\[h\\]\\s*theorem rev_rev \\(α : Type\\) \\(xs : List α\\) : xs\\.rev\\.rev = xs := by\\s*sorry"
            replace: "  | h :: t => List.rev t ++ [h]\n\ntheorem bidirect_ind {α : Type} {P : List α → Prop} (nil : P []) (sing : (s : α) -> P [s])\n  (cons : (head last: α) → (tail : List α) → P tail → P (head :: tail ++ [last]))\n        : forall l : List α, P l := by\n  sorry\n\ntheorem rev_rev (α : Type) (xs : List α) : xs.rev.rev = xs := by\n  sorry"
      - name: "Prove custom induction principle"
        description: "Prove it by well-founded recursion on the list length. Split the list: if the tail is empty, use the singleton case; otherwise write the tail as `init ++ [last]` (via `List.eq_nil_or_concat`) and recurse on the structurally smaller middle. Close it with `termination_by l => l.length`."
        code_completions:
          - name: "Proof"
            find: "theorem bidirect_ind[\\s\\S]*?forall l : List α, P l := by\\s*sorry"
            replace: "theorem bidirect_ind {α : Type} {P : List α → Prop} (nil : P []) (sing : (s : α) -> P [s])\n  (cons : (head last: α) → (tail : List α) → P tail → P (head :: tail ++ [last]))\n        : forall l : List α, P l := by\n  intro l\n  cases l with\n  | nil => exact nil\n  | cons h t => cases List.eq_nil_or_concat t with\n                | inl htnil => subst htnil; apply sing\n                | inr e => cases e with |intro w e\n                           cases e with |intro lst hteq\n                           subst hteq\n                           simp\n                           apply cons\n                           apply bidirect_ind <;> grind\ntermination_by l => l.length"

  - name: "Helper lemmas: rev_append & rev_cons"
    force_find: "(?:theorem List\\.rev_append[\\s\\S]*?(?=\\ntheorem))?(?:theorem List\\.rev_cons[\\s\\S]*?(?=\\ntheorem))?theorem rev_rev[\\s\\S]*?(?=\\n\\n|\\n--|\\n#|$)"
    steps:
      - name: "Two lemmas about rev"
        description: "Before the main proof you need two rewriting lemmas describing how `rev` interacts with `++` and `::`: `rev_append` says `(xs ++ [head]).rev = head :: xs.rev`, and `rev_cons` says `(head :: xs).rev = xs.rev ++ [head]`."
      - name: "State the lemmas"
        description: "Add both lemma signatures just before `rev_rev`."
        code_completions:
          - name: "Signatures"
            find: "theorem rev_rev \\(α : Type\\) \\(xs : List α\\) : xs\\.rev\\.rev = xs := by\\s*sorry"
            replace: "theorem List.rev_append {α : Type} {xs : List α} {head: α} : (xs ++ [head]).rev = head :: xs.rev := by\n  sorry\n\ntheorem List.rev_cons {α : Type} {xs : List α} {head: α} : (head :: xs).rev = xs.rev ++ [head] := by\n  sorry\n\ntheorem rev_rev (α : Type) (xs : List α) : xs.rev.rev = xs := by\n  sorry"
      - name: "Prove first lemma"
        description: "Induct on `xs` and discharge both cases by unfolding `List.rev` with `simp_all`."
        code_completions:
          - name: "Proof"
            find: "theorem List\\.rev_append \\{α : Type\\} \\{xs : List α\\} \\{head: α\\} : \\(xs \\+\\+ \\[head\\]\\)\\.rev = head :: xs\\.rev := by\\s*sorry"
            replace: "theorem List.rev_append {α : Type} {xs : List α} {head: α} : (xs ++ [head]).rev = head :: xs.rev := by\n  induction xs <;> simp_all [List.rev]"
      - name: "Prove second lemma"
        description: "Same idea: `induction xs <;> simp_all [List.rev]`."
        code_completions:
          - name: "Proof"
            find: "theorem List\\.rev_cons \\{α : Type\\} \\{xs : List α\\} \\{head: α\\} : \\(head :: xs\\)\\.rev = xs\\.rev \\+\\+ \\[head\\] := by\\s*sorry"
            replace: "theorem List.rev_cons {α : Type} {xs : List α} {head: α} : (head :: xs).rev = xs.rev ++ [head] := by\n  induction xs <;> simp_all [List.rev]"

  - name: "Main proof: rev_rev"
    force_find: "theorem rev_rev \\(α : Type\\)[\\s\\S]*?(?=\\n\\n|\\n--|\\n#|$)"
    steps:
      - name: "Main theorem"
        description: "Now prove `rev_rev` using `bidirect_ind` instead of ordinary structural induction."
      - name: "Apply custom induction principle"
        description: "Phrase the goal as `∀ xs, xs.rev.rev = xs` and `apply bidirect_ind`, leaving three goals: the nil case, the singleton case, and the bidirectional step."
        code_completions:
          - name: "Setup"
            find: "theorem rev_rev \\(α : Type\\) \\(xs : List α\\) : xs\\.rev\\.rev = xs := by\\s*sorry"
            replace: "theorem rev_rev (α : Type) : forall (xs : List α), xs.rev.rev = xs := by\n  apply bidirect_ind\n  · sorry\n  · sorry\n  · sorry"
      - name: "Close the goals"
        description: "The nil and singleton cases follow just by unfolding `List.rev`. The step case reverses front-and-back, so finish it with `grind [List.rev_append, List.rev_cons]`."
        code_completions:
          - name: "Final proof"
            find: "theorem rev_rev \\(α : Type\\) : forall \\(xs : List α\\), xs\\.rev\\.rev = xs := by\\s*apply bidirect_ind\\s*· sorry\\s*· sorry\\s*· sorry"
            replace: "theorem rev_rev (α : Type) : forall (xs : List α), xs.rev.rev = xs := by\n  apply bidirect_ind\n  · simp [List.rev]\n  · intro s\n    dsimp [List.rev]\n  · intro head last tail ht\n    simp [List.rev]\n    grind [List.rev_append, List.rev_cons]"
